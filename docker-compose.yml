version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: banco-sangue-db
    environment:
      POSTGRES_DB: banco_sangue
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 12345
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - banco-sangue-network

  app:
    build: .
    container_name: banco-sangue-api
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/banco_sangue
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: 12345
      SPRING_PROFILES_ACTIVE: dev
    ports:
      - "8080:8080"
    restart: unless-stopped
    networks:
      - banco-sangue-network

volumes:
  postgres_data:

networks:
  banco-sangue-network:
    driver: bridge